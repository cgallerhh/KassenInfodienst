name: Wöchentlicher KassenInfodienst

on:
  # Jeden Freitag um 09:00 Uhr (UTC+0) → 09:00 Uhr MEZ = 08:00 UTC
  # Für deutsche Zeit (MEZ/MESZ):
  #   Winter (MEZ  = UTC+1): 08:00 UTC = 09:00 MEZ
  #   Sommer (MESZ = UTC+2): 07:00 UTC = 09:00 MESZ
  # → 08:00 UTC ist ein guter Kompromiss
  schedule:
    - cron: "0 8 * * 5"

  # Manueller Start über GitHub UI (für Tests)
  workflow_dispatch:
    inputs:
      kassen:
        description: "Nur bestimmte Kassen (leer = alle), z.B.: TK BARMER DAK"
        required: false
        default: ""
      tage:
        description: "Recherchezeitraum in Tagen"
        required: false
        default: "7"

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write   # Für git push von last_week.md

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Digest erstellen und E-Mail senden
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_RESEARCH_MODEL: ${{ secrets.OPENAI_RESEARCH_MODEL }}
          OPENAI_SCORING_MODEL: ${{ secrets.OPENAI_SCORING_MODEL }}
          OPENAI_NEWSLETTER_MODEL: ${{ secrets.OPENAI_NEWSLETTER_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
          LINKDAPI_KEY: ${{ secrets.LINKDAPI_KEY }}
          INPUT_KASSEN: ${{ github.event.inputs.kassen || '' }}
          INPUT_TAGE: ${{ github.event.inputs.tage || '7' }}
        run: |
          # Kassen-Filter aus manuellem Aufruf
          KASSEN_ARG=""
          if [ -n "$INPUT_KASSEN" ]; then
            KASSEN_ARG="--kassen $INPUT_KASSEN"
          fi

          TAGE="$INPUT_TAGE"
          TAGE="${TAGE:-7}"

          python digest.py $KASSEN_ARG --tage "$TAGE" --email

      - name: Gedächtnis (last_week.md) committen
        if: success()
        run: |
          git config user.name "KassenInfodienst Bot"
          git config user.email "actions@github.com"
          if git diff --quiet last_week.md 2>/dev/null || [ ! -f last_week.md ]; then
            echo "Kein Update nötig."
          else
            git add last_week.md
            git commit -m "chore: last_week.md Update $(date +%Y-%m-%d)"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "$GITHUB_REF_NAME"
          fi

      - name: Bericht als Artefakt speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: reports/
          retention-days: 90
